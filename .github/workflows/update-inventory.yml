name: Update Inventory from MachineryTrader

on:
  schedule:
    # Runs every day at 8:00 AM UTC (3:00 AM EST / 2:00 AM CST)
    - cron: '0 8 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  sync-inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit + push changes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run inventory scraper
        run: python3 scraper/scraper.py

      - name: Commit and push if changed
        run: |
          git config user.name  "Underterra Bot"
          git config user.email "bot@underterrallc.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 Auto-sync inventory from MachineryTrader [$(date +'%Y-%m-%d')]"
          git push
